<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore di Numeri Casuali</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin-top: 100px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .risultato {
            margin-top: 30px;
            font-size: 50px;
            font-weight: bold;
            color: #d9534f;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Generatore Casuale</h1>
        <p>Clicca il bottone per estrarre un numero da 1 a 100</p>
        
        <form method="POST">
            <button type="submit">Estrai Numero</button>
        </form>

        {% if risultato %}
            <div class="risultato">Il numero estratto è: {{ risultato }}</div>
        {% endif %}
    </div>

</body>
</html>
